[tools]
restic="0.18.1"
age="1.3.1"
jq="1.8.1"

[env]
AWS_DEFAULT_REGION="nbg1"
RESTIC_REPOSITORY="s3:nbg1.your-objectstorage.com/pelle-io-backup"

[tasks."backup:bootstrap:update-credentials"]
run="""
read -p "enter access key for backup S3 bucket: " backup_s3_access_key
echo $backup_s3_access_key
read -p "enter secret key for backup S3 bucket: " backup_s3_secret_key
echo $backup_s3_access_key

BACKUP_s3_CREDENTIALS=$(jq --null-input \
  --arg backup_s3_access_key "$backup_s3_access_key" \
  --arg backup_s3_secret_key "$backup_s3_secret_key" \
  '{"backup_s3_access_key": $backup_s3_access_key, "backup_s3_secret_key": $backup_s3_secret_key}')
echo ${BACKUP_s3_CREDENTIALS} | age --encrypt --passphrase --armor --output backup_s3_credentials.age
"""

[tasks."backup:bootstrap:env"]
run="""
BACKUP_S3_CREDENTIALS=$(age --decrypt < backup_s3_credentials.age)
echo "export AWS_ACCESS_KEY_ID=\"$(echo ${BACKUP_S3_CREDENTIALS} | jq -r '.backup_s3_access_key')\""
echo "export AWS_SECRET_ACCESS_KEY=\"$(echo ${BACKUP_S3_CREDENTIALS} | jq -r '.backup_s3_secret_key')\""
"""

[tasks."backup:bootstrap:init"]
run="""
restic init
"""

[tasks."backup:secrets"]
run="""
#!/bin/env bash

source lib.sh

ensure_backup_env
restic backup --verbose backup ~/secrets
"""

[tasks."backup:snapshots"]
run="""
#!/bin/env bash

source lib.sh

ensure_backup_env
restic snapshots
"""
